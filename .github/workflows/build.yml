name: build

# build on c/cpp changes or workflow changes
on:
  push:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'util/buildbot/**'
      - 'util/ci/**'
      - '.github/workflows/**.yml'
      - 'Windows/**'
  pull_request:
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'util/buildbot/**'
      - 'util/ci/**'
      - '.github/workflows/**.yml'
  workflow_dispatch: # Ручний запуск

jobs:
  # This is the current gcc compiler (available in jammy)
  gcc_10:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          source ./util/ci/common.sh
          install_linux_deps g++-10
          build_linux_deps

      - name: Build
        run: |
          ./util/ci/build.sh
        env:
          CC: gcc-10
          CXX: g++-10

      - name: Test
        run: |
          ./bin/multicraft --run-unittests

  # This is the current clang version
  clang_11:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          source ./util/ci/common.sh
          install_linux_deps clang-11 valgrind libluajit-5.1-dev
          build_linux_deps

      - name: Build
        run: |
          ./util/ci/build.sh
        env:
          CC: clang-11
          CXX: clang++-11
          CMAKE_FLAGS: "-DREQUIRE_LUAJIT=1"

      - name: Test
        run: |
          ./bin/multicraft --run-unittests

  docker:
    name: "Docker image"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build docker image
        run: |
          docker build .

  msys2-mingw64:
    name: "MSYS2-MinGW (64-bit)"
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-clang mingw-w64-x86_64-cmake mingw-w64-x86_64-autotools mingw-w64-x86_64-tcl git zip

      - name: Build
        run: |
          cd ./Windows
          ./Start.sh
          cmake --build . -j
          cd -
          strip -s ./bin/multicraft.exe

      - name: Create ZIP
        run: |
          mkdir MultiCraft
          cp -r ./bin MultiCraft/
          cp -r ./builtin MultiCraft/
          cp -r ./client MultiCraft/
          cp -r ./fonts MultiCraft/
          cp -r ./locale MultiCraft/
          cp -r ./textures MultiCraft/
          zip -r MultiCraft.zip MultiCraft

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiCraft-msys2-mingw64
          path: ./MultiCraft.zip

  msvc:
    name: VS 2022 ${{ matrix.config.arch }}-${{ matrix.type }}
    runs-on: windows-2022
    env:
      # ДОДАНО ПАКЕТ sdl2 ДЛЯ СУМІСНОСТІ З IRRLICHT
      vcpkg_packages: zlib zstd curl openal-soft libvorbis libogg sqlite3 freetype luajit gmp jsoncpp libpng libjpeg-turbo sdl2 sdl3
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              arch: x86,
              generator: "-G 'Visual Studio 17 2022' -A Win32",
              vcpkg_triplet: x86-windows
            }
          - {
              arch: x64,
              generator: "-G 'Visual Studio 17 2022' -A x64",
              vcpkg_triplet: x64-windows
            }
        type: [portable]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Використовуємо попередньо встановлений vcpkg в системі Windows Runner
      - name: Install dependencies via vcpkg
        run: |
          vcpkg install ${{ env.vcpkg_packages }} --triplet ${{ matrix.config.vcpkg_triplet }}

      - name: Irrlicht
        run: |
          git clone --depth 1 -b SDL https://github.com/MoNTE48/Irrlicht irrlicht
          cd irrlicht
          cmake ${{ matrix.config.generator }}  `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"  `
          -DCMAKE_BUILD_TYPE=Release .
          cmake --build . -j --config Release
          cd ..

      - name: CMake
        run: |
          cmake ${{ matrix.config.generator }}  `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"  `
          -DCMAKE_BUILD_TYPE=Release  `
          -DENABLE_POSTGRESQL=OFF  `
          -DUSE_SDL=1  `
          -DIRRLICHT_LIBRARY="${{ github.workspace }}\irrlicht\Release\irrlicht.lib"  `
          -DIRRLICHT_INCLUDE_DIR="${{ github.workspace }}\irrlicht\include"  `
          -DCMAKE_C_FLAGS="-DNO_IRR_COMPILE_WITH_OGLES2_ -DNO_IRR_COMPILE_WITH_DIRECT3D_9_ -DNO_IRR_COMPILE_WITH_DIRECTINPUT_JOYSTICK_ -D_IRR_STATIC_LIB_"  `
          -DCMAKE_CXX_FLAGS="-DNO_IRR_COMPILE_WITH_OGLES2_ -DNO_IRR_COMPILE_WITH_DIRECT3D_9_ -DNO_IRR_COMPILE_WITH_DIRECTINPUT_JOYSTICK_ -D_IRR_STATIC_LIB_"  `
          -DRUN_IN_PLACE=${{ contains(matrix.type, 'portable') }} .

      - name: Build
        run: cmake --build . --config Release

